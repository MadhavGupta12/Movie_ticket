<div class="container">
  <div class="text-center mb-4">
    <h1>{{ title }}</h1>
    <p class="text-muted">Select a movie, pick an available seat, and reserve in one flow.</p>
  </div>

  <div class="row">
    <div class="col-md-5 mb-4">
      <div class="card p-4">
        <h5>User Login / Register</h5>
        <form (ngSubmit)="registerUser()">
          <div class="mb-3">
            <label class="form-label">Name</label>
            <input type="text" class="form-control" [(ngModel)]="registerName" name="name" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" [(ngModel)]="registerEmail" name="email" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" [(ngModel)]="registerPassword" name="password" required>
          </div>
          <button type="submit" class="btn btn-primary w-100">Register</button>
        </form>

        <div class="mt-3 text-muted small">
          Registered test accounts:
          <ul class="mb-0">
            <li>user@movie.com</li>
            <li>admin@movie.com</li>
          </ul>
        </div>
      </div>
    </div>

    <div class="col-md-7 mb-4">
      <div class="card p-4">
        <h5>Movie Selection</h5>
        <div class="mb-3">
          <label class="form-label">Booking Email</label>
          <input type="email" class="form-control" [(ngModel)]="bookingEmail" name="bookingEmail" placeholder="user@movie.com" required>
        </div>

        <div class="mb-3">
          <label class="form-label">Available Movies</label>
          <select class="form-select" [(ngModel)]="selectedMovieId" name="movie" (change)="loadSeats()">
            <option [ngValue]="null">-- Select a movie --</option>
            <option *ngFor="let movie of movies" [ngValue]="movie.id">
              {{ movie.title }} ({{ movie.showTime }})
            </option>
          </select>
        </div>

        <div *ngIf="availableSeats.length > 0" class="mb-3">
          <h6>Available Seats</h6>
          <div class="seat-grid">
            <button type="button" class="btn btn-outline-secondary seat-button"
                    *ngFor="let seat of availableSeats"
                    [class.selected]="seat.id === selectedSeatId"
                    (click)="selectedSeatId = seat.id">
              {{ seat.seatNumber }}
            </button>
          </div>
        </div>

        <button class="btn btn-success" [disabled]="!selectedSeatId || !bookingEmail" (click)="reserve()">Reserve Selected Seat</button>

        <div *ngIf="message" class="alert alert-info mt-3">{{ message }}</div>
      </div>
    </div>
  </div>
</div>
